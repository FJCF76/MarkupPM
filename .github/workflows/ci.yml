name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT: MarkupPM/MarkupPM.csproj
  TEST_PROJECT: MarkupPM.Tests/MarkupPM.Tests.csproj

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore "${{ env.PROJECT }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT }}" --configuration Release --no-restore

      - name: Restore tests
        run: dotnet restore "${{ env.TEST_PROJECT }}"

      - name: Test
        run: dotnet test "${{ env.TEST_PROJECT }}" --configuration Release --verbosity normal

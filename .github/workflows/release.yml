name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  PROJECT: MarkupPM/MarkupPM.csproj
  CONFIGURATION: Release
  PLATFORM: x64
  PACKAGE_DIR: ${{ github.workspace }}\artifacts\

jobs:
  build-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore "${{ env.PROJECT }}"

      - name: Extract version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver4 = $tag.TrimStart('v') + ".0"
          $ver3 = $tag.TrimStart('v')
          echo "VERSION4=$ver4" >> $env:GITHUB_ENV
          echo "VERSION3=$ver3" >> $env:GITHUB_ENV

      - name: Update manifest version
        run: |
          $manifest = "MarkupPM\Package.appxmanifest"
          $content = Get-Content $manifest -Raw
          $content = $content -replace '(<Identity[^>]*\bVersion=")[^"]*(")', "`${1}${{ env.VERSION4 }}`${2}"
          Set-Content $manifest $content -NoNewline

      - name: Update csproj version
        run: |
          $csproj = "MarkupPM\MarkupPM.csproj"
          (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>${{ env.VERSION3 }}</Version>" |
            Set-Content $csproj

      - name: Create self-signed cert
        run: |
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=15FD663E-D585-410B-9B3C-C709530D3E9F" `
            -KeyUsage DigitalSignature -FriendlyName "MarkupPM Store" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          $pwd = ConvertTo-SecureString -String "DevOnly" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath ".\DevCert.pfx" -Password $pwd
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      - name: Publish app files
        run: |
          dotnet publish "${{ env.PROJECT }}" `
            -c ${{ env.CONFIGURATION }} `
            -r win-x64 `
            --self-contained true `
            -p:PublishReadyToRun=true `
            -p:WindowsPackageType=None `
            -p:AppxPackageSigningEnabled=false `
            -o "${{ env.PACKAGE_DIR }}publish"

      - name: Build MSIX package
        run: |
          $layout = "${{ env.PACKAGE_DIR }}layout"
          $publish = "${{ env.PACKAGE_DIR }}publish"
          $manifestSource = "MarkupPM\Package.appxmanifest"
          $manifestOut = Join-Path $layout "AppxManifest.xml"
          $msixPath = "${{ env.PACKAGE_DIR }}MarkupPM_${{ env.VERSION3 }}_x64.msix"

          New-Item -ItemType Directory -Force -Path $layout | Out-Null
          Copy-Item "$publish\*" $layout -Recurse -Force

          # Remove any AppxManifest.xml the SDK may have generated with wrong MinVersion
          Get-ChildItem $layout -Recurse -Filter "AppxManifest.xml" | Remove-Item -Force

          $assetsTarget = Join-Path $layout "Assets"
          New-Item -ItemType Directory -Force -Path $assetsTarget | Out-Null
          Copy-Item "MarkupPM\Assets\*" $assetsTarget -Recurse -Force

          $manifest = Get-Content $manifestSource -Raw
          $manifest = $manifest.TrimStart([char]0xFEFF)
          $manifest = [regex]::Replace($manifest, '^\s*<\?xml.*?\?>', '<?xml version="1.0" encoding="utf-8"?>')
          # Identity fields already correct in Package.appxmanifest — no replacement needed
          $manifest = $manifest -replace 'Executable="\$targetnametoken\$\.exe"', 'Executable="MarkupPM.exe"'
          $manifest = $manifest -replace 'EntryPoint="\$targetentrypoint\$"', 'EntryPoint="Windows.PartialTrustApplication"'
          [System.IO.File]::WriteAllText($manifestOut, $manifest, (New-Object System.Text.UTF8Encoding($false)))

          $makeAppx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter makeappx.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          $signTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          & $makeAppx pack /d $layout /p $msixPath /o
          & $signTool sign /fd SHA256 /f ".\DevCert.pfx" /p "DevOnly" $msixPath

      - name: List packaged files
        shell: pwsh
        run: |
          if (Test-Path "${{ env.PACKAGE_DIR }}") {
            Get-ChildItem -Path "${{ env.PACKAGE_DIR }}" -Recurse -File | Select-Object FullName
          }
          else {
            Write-Host "No package directory found at: ${{ env.PACKAGE_DIR }}"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MarkupPM-${{ github.ref_name }}
          path: |
            ${{ env.PACKAGE_DIR }}*.msix
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACKAGE_DIR }}*.msix
          body: |
            ## MarkupPM ${{ github.ref_name }}

            Descarga el `.msix` solo para testing local (firma de desarrollo).
            La versión oficial está disponible en **Microsoft Store**.

            Para instalar la versión de testing, habilita "Instalar desde fuentes externas" en Windows.
